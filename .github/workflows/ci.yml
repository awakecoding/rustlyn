name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            llvm_asset: clang+llvm-22.1.4-x86_64-windows.tar.xz
          - os: ubuntu-latest
            llvm_asset: clang+llvm-22.1.4-x86_64-ubuntu-24.04.tar.xz
          - os: macos-latest
            llvm_asset: clang+llvm-22.1.4-aarch64-macos.tar.xz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install prebuilt LLVM 22.1.4
        shell: pwsh
        run: |
          $asset = '${{ matrix.llvm_asset }}'
          $url = "https://github.com/awakecoding/llvm-prebuilt/releases/download/v2026.1.0/$asset"
          $stage = Join-Path $env:RUNNER_TEMP 'llvm'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $archive = Join-Path $stage $asset
          Write-Host "Downloading $url"
          curl -fsSL -o $archive $url
          tar -xJf $archive -C $stage
          $root = Get-ChildItem -Path $stage -Directory | Where-Object { $_.Name -like 'clang+llvm-*' } | Select-Object -First 1
          if (-not $root) { throw "LLVM root not found after extracting $archive" }
          $resolved = $root.FullName
          Write-Host "RUSTLYN_LLVM_ROOT=$resolved"
          "RUSTLYN_LLVM_ROOT=$resolved" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          # Sanity check
          if ($IsWindows) {
            Test-Path (Join-Path $resolved 'bin\llvm-config.exe') | ForEach-Object { Write-Host "llvm-config.exe present: $_" }
          } else {
            Test-Path (Join-Path $resolved 'bin/llvm-config') | ForEach-Object { Write-Host "llvm-config present: $_" }
          }

      - name: Install LLVM support libraries
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $installRoot = Join-Path $env:RUNNER_TEMP 'vcpkg-installed'
          vcpkg install zlib:x64-windows libxml2:x64-windows --x-install-root=$installRoot
          $installed = Join-Path $installRoot 'x64-windows'
          $libDir = Join-Path $installed 'lib'
          $binDir = Join-Path $installed 'bin'
          if (-not (Test-Path $libDir)) {
            throw "vcpkg lib directory was not found under $libDir"
          }

          Get-ChildItem -Path $libDir -Filter '*.lib' | ForEach-Object { Write-Host "vcpkg lib: $($_.Name)" }
          if (-not (Test-Path (Join-Path $libDir 'zlib.lib'))) {
            $zlib = Get-ChildItem -Path $libDir -Filter 'zlib*.lib' | Select-Object -First 1
            if (-not $zlib) { $zlib = Get-ChildItem -Path $libDir -Filter 'z*.lib' | Select-Object -First 1 }
            if (-not $zlib) { throw "vcpkg zlib library was not found under $libDir" }
            Copy-Item -LiteralPath $zlib.FullName -Destination (Join-Path $libDir 'zlib.lib')
          }
          if (-not (Test-Path (Join-Path $libDir 'xml2.lib'))) {
            $xml2 = Get-ChildItem -Path $libDir -Filter '*xml2*.lib' | Select-Object -First 1
            if (-not $xml2) { throw "vcpkg libxml2 library was not found under $libDir" }
            Copy-Item -LiteralPath $xml2.FullName -Destination (Join-Path $libDir 'xml2.lib')
          }
          "LIB=$libDir;$env:LIB" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          if (Test-Path $binDir) {
            $binDir | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
          }

      - name: Build backend
        run: |
          dotnet build dotnet/backend/src/Rustlyn.Backend/Rustlyn.Backend.csproj -c Release
          dotnet build dotnet/backend/src/Rustlyn.Tool/Rustlyn.Tool.csproj -c Release
          dotnet build dotnet/backend/src/Rustlyn.Bindings.Tool/Rustlyn.Bindings.Tool.csproj -c Release

      - name: Build tests
        run: dotnet build dotnet/backend/tests/Rustlyn.Backend.Tests/Rustlyn.Backend.Tests.csproj -c Release

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Smoke test LLVM helper
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $toolDll = Join-Path $PWD 'dotnet/backend/src/Rustlyn.Tool/bin/Release/net10.0/rustlyn.dll'
          ./scripts/Test-LlvmHelper.ps1 -Sample add -ToolDll $toolDll
          ./scripts/Test-RustlynLlvmOpt.ps1 -Sample add -SkipBuild -ToolDll $toolDll

      - name: Install Rust nightly toolchain
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: rustup toolchain install nightly --component rust-src

      - name: Smoke test MSBuild SDK
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          ./scripts/Test-MsBuildSdk.ps1 -Configuration Release -SkipToolBuild
          ./scripts/Test-MsBuildSdkBinary.ps1 -Configuration Release -SkipToolBuild
          ./scripts/Test-MsBuildSdkBuildStd.ps1 -Configuration Release -SkipToolBuild
          ./scripts/Test-MsBuildSdkPackage.ps1 -Configuration Release -SkipToolBuild

      - name: Smoke test PowerShell format modules
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/Test-RustFormatPowerShellModules.ps1

      - name: Smoke test (core matrix)
        shell: pwsh
        run: |
          $samples = @('add','and','or','xor','shl','ashr','lshr','mul','div','sub','select','phi_merge')
          $toolDll = Join-Path $PWD 'dotnet/backend/src/Rustlyn.Tool/bin/Release/net10.0/rustlyn.dll'
          ./scripts/Test-Smoke.ps1 -Sample $samples -Mode Bitcode -Configuration Release -ToolDll $toolDll

      - name: Run backend regression harness
        shell: pwsh
        run: |
          $testDll = Join-Path $PWD 'dotnet/backend/tests/Rustlyn.Backend.Tests/bin/Release/net10.0/Rustlyn.Backend.Tests.dll'
          dotnet $testDll

      - name: Audit documentation claims against support matrix
        shell: pwsh
        run: ./scripts/Test-DocClaims.ps1

      - name: Smoke test Native AOT scaffold
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $toolDll = Join-Path $PWD 'dotnet/backend/src/Rustlyn.Tool/bin/Release/net10.0/rustlyn.dll'
          ./scripts/Test-AotSmoke.ps1 -ToolDll $toolDll

  extended:
    name: Extended fixtures
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install prebuilt LLVM 22.1.4
        shell: pwsh
        run: |
          $asset = 'clang+llvm-22.1.4-x86_64-ubuntu-24.04.tar.xz'
          $url = "https://github.com/awakecoding/llvm-prebuilt/releases/download/v2026.1.0/$asset"
          $stage = Join-Path $env:RUNNER_TEMP 'llvm'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $archive = Join-Path $stage $asset
          Write-Host "Downloading $url"
          curl -fsSL -o $archive $url
          tar -xJf $archive -C $stage
          $root = Get-ChildItem -Path $stage -Directory | Where-Object { $_.Name -like 'clang+llvm-*' } | Select-Object -First 1
          if (-not $root) { throw "LLVM root not found after extracting $archive" }
          $resolved = $root.FullName
          Write-Host "RUSTLYN_LLVM_ROOT=$resolved"
          "RUSTLYN_LLVM_ROOT=$resolved" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          Test-Path (Join-Path $resolved 'bin/llvm-config') | ForEach-Object { Write-Host "llvm-config present: $_" }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Smoke test extended samples
        shell: pwsh
        run: |
          $samples = @('async_state_machine','enum_complex','error_propagation','generic_collections','global_ptr_pass','iterator_chain')
          ./scripts/Test-Smoke.ps1 -Sample $samples -Mode Bitcode -Stage Inspect -Configuration Release

      - name: Pack templates
        continue-on-error: true
        run: dotnet pack templates/Rustlyn.Templates.csproj -c Release

  bindings-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Build bindings tool
        run: dotnet build dotnet/backend/src/Rustlyn.Bindings.Tool/Rustlyn.Bindings.Tool.csproj -c Release -m:1

      - name: Validate binding surface
        shell: pwsh
        run: |
          $bindingsToolDll = Join-Path $PWD 'dotnet/backend/src/Rustlyn.Bindings.Tool/bin/Release/net10.0/Rustlyn.Bindings.Tool.dll'
          dotnet $bindingsToolDll validate --type "System.Math, System.Runtime" --report-only

      - name: Test delegate analysis
        shell: pwsh
        run: |
          $bindingsToolDll = Join-Path $PWD 'dotnet/backend/src/Rustlyn.Bindings.Tool/bin/Release/net10.0/Rustlyn.Bindings.Tool.dll'
          dotnet $bindingsToolDll analyze-delegate "System.Func``2[[System.Int32],[System.Int32]]"
